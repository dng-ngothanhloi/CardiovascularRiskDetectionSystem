random_seed: 42

paths:
  fe_dir: artifacts/fe
  fe_dir_tabnet: artifacts/fe/tabnet  # Optional: TabNet-specific FE directory
  model_dir: artifacts/Model
  data: data/cardio_data.csv
  artifacts: artifacts
  reports: reports
  eda_dir: artifacts/eda
  preprocessing_dir: artifacts/preprocessing
  # Model-specific feature engineering paths
  fe_rf_dir: artifacts/fe/random_forest
  fe_tabnet_dir: artifacts/fe/tabnet

evaluation:
  cv_folds: 5
  metrics: [roc_auc, pr_auc, f1, brier, ece, accuracy]

modeling:
  model_type: rf  # rf | tabnet | vae_tabnet
  hpo:
    enabled: true
    n_trials: 30
    timeout_min: null   # null = no wall-clock limit (reproducible; bounded only by n_trials)
    pruner: median
    composite_weights: [0.4, 0.4, 0.2]  # [roc_auc, pr_auc, accuracy] - weights for composite score optimization
  calibration:
    enabled: true
    method: platt  # platt | isotonic
  early_stopping:
    patience: 15
    monitor: val_pr_auc
    min_delta: 0.0005
  test_scoring: true
  final_model: true
  final_model_param_strategy: best_fold_val_pr_auc  # or median_mode_aggregate_fold_params
  final_model_selection_metric: pr_auc  # fold val metric for best-fold selection (Train only)

rf:
  class_weight: balanced

# Pinned to baseline fold_0 (sparse attention → ~19 L3 rules).
# When training TabNet, use configs/tabnet_baseline.yaml (hpo.enabled: false)
# so these defaults are applied instead of Optuna searching a flat-attention region.
tabnet:
  n_d: 12
  n_a: 12
  n_steps: 4
  gamma: 1.625957341248133
  lambda_sparse: 0.0005927172136384618
  batch_size: 128
  epochs: 80
  lr: 0.0024260876636955963
  dropout: 0.15580833938492766

vae:
  latent_dim: 16
  width: 256
  depth: 3
  beta: 1.0
  dropout: 0.1
  lr: 1e-3
  batch_size: 128
  epochs: 50
  joint_training: false  # true → optimize L_joint
  lambda_cls: 1.0

# Legacy compatibility
model:
  type: ensemble_joint
  params:
    vae_latent_dim: 16
    tabnet_steps: 5
    lambda_sparse: 1e-4

training:
  batch_size: 128
  epochs: 10
  optimizer: adam
  learning_rate: 1e-3
  seed: 42

feature_engineering:
  remove_correlated: true
  correlation_threshold: 0.95
  use_mice: false
  use_interaction_features: true
  use_stability_selection: false
  stability_threshold: 0.6
  top_k_features: 15
  auto_select_k: false
  k_range: [5, 8, 10, 12, 15, 17, 20]
  cv_folds: 5
  scoring: roc_auc
  tabnet:
    skip_audit: false
    keep_all_features: true

preprocessing:
  target: cardio
  target_col: cardio  # Alias for target, used in modeling stage
  test_size: 0.2
  seed: 42
  strict_filter: false
  clean_bp: true
  handle_outliers: true
  use_mice: false
  remove_correlated: true
  validate_split: true
  use_eda_outputs: true
